body:
  text: 穆修伯長書答喬適書月日河南穆修白秀才足下近辱書并示文十萹終始讀其命意甚髙自及淮西來嘗見人言足下少年樂古文固耳聞而心存之但未敢輒輕信人說今遂果知足下能肰蓋古道息絶不行于時已久今世士子習尚淺近非章句聲偶之辭不置耳目浮軌濫轍相跡而奔靡有異途焉其間獨敢以古文語者則與語怪者同也衆又排詬之罪毁之不目以為迂則指以為惑謂之背時逺名闊于冨貴先進則莫有譽之者同儕則莫有附之者其人茍無自知之明守之不以固持之不以堅則莫不懼而疑悔而思忽焉且復去此而即彼矣噫仁義忠正之士豈獨多出于古而鮮出于今哉亦由時風衆勢驅遷溺染之使不得從乎道也觀足下十萹之文則信有志于古文矣其書之問則曰將學于今則慮成淺陋將文于古則懼不取名于世學冝何㫖引韓先生師說之說以求解惑為請足下當少秀之年懷進取之機反學古于仁義不勝之時與之者寡非之者衆不得無惑于中焉是以枉書見問某不才而棄于時者也何足為人盾其是非可否徒以退拙無所用心因得從事于不急之文如舊者不識其愚且戅或謂之為好古焉故足下以是厚相期待者蓋感其聲而求其類乎可不少復其意耶試為足下言之夫學乎古者所以為道文乎今者所以為名道者仁義之謂也名者爵祿之謂也然則行道者有以兼乎名中名者無以兼乎道何者行夫道者雖固有窮逹云耳然而逹于上也則為賢公卿窮于下也則為令君子其在上則禮成乎君而治加乎人其在下則順悅乎親而勤修乎身窮也逹也皆夲于善稱焉守夫名者亦固有窮逹云耳而皆反于是也逹于上也何賢公卿乎窮于下也何令君子乎其在上則無所成乎君而加乎人其在下則無所悅乎親而修乎身窮也逹也皆離于善稱焉故曰行道者有以兼乎名守名者無以兼乎道有其道而無其名則窮不失為君子有其名而無其道則逹不失為小人與其為名逹之小人孰若為道窮之君子矧窮逹各繫其時遇豈古之道有負于人耶足下有志乎道而未忘乎名樂聞于古而喜求于今二者之心茍交存而無擇將懼純明之性寖微浮躁之氣驟勝矣足下心明乎仁義又學識其歸向在固守而弗離堅持而弗奪力行而弗止則必立乎名之大者矣學之正僞有分則文之指用自得何惑焉不宣某白上大名陳觀察書觀察閣下修嘗病近世以來文武異道將相異材為弊于時久矣古之所謂文武之道蓋一道也但治亂之用殊所謂將相之才皆通材也由出處之寄異未有不逹權謀而名能相國者未有不明學術而名能將兵者則古之取將相也率由文武之道一焉近世則不然謂儒為文謂卒為武茍登之為相矣則不復寄以軍武之任而曰此文人也不足語以武茍拔之為將矣則不求以儒術之學而曰此武夫也不當責以文時既擇將相之具不同人遂目文武之術為異時之所以不得其人人之所以不盡其用其弊皆出于此乎修當願識如古之賢傑之人文究經綸武洞權變弛張諧物理動靜應機㑹陽開隂合與鬼神造化爭其功用無所施而不得者如此之人逢其時運其才出入乎文武將相地使剛粗匹夫號名主將者觀之聞之色死氣喪俯首聼命知將帥之道不在于彼而在吾儒也豈不偉哉求之當今他未獲覩惟服閣下之才德風略于斯有年矣伏惟閣下名極而望峻識淵而量閎視鼎甲之第于當年若掇遺物之易蹈霄漢之衢于平昔如馳坦途之速周歷清美深集禁密言蔚典冊茟動雲雨嘗斯之時天下之人共言閣下之文章真辭臣矣一旦奉明詔去內廷統將符分亷問奠枕攸倚來藩北門命下之辰威聲四出當斯之時天下之人又言閣下之氣略真帥矣天下之所以稱之如彼者何如此者何非私言也抑以閣下之才全能巨無施不稱文德武偹靡不在躬也附衆却敵靡不如意也以是而天下言之耳然則雖古之賢傑復生諒何以加此修可不向風馳想氣激神竦求一識大賢之子之風采忽不自知其貧且賤嬴糧躡屩來及魏都亦既至止復倣徨蹢躅不敢徑進則訪謀于諸府僚從事或有言曰公性嚴急難犯也或曰公性深沉不測也始聞之甚懼且疑徐念之則悟以解曰彼言公嚴急難犯者其非也公方負天下文武之望以賔接士大夫為切務顧肯肆嚴急難犯之性損其容納度量乎斯不然矣彼曰深沉不測者冝有之凡大賢君子動作施為皆不使人窺其涯畔今公柄國重任殿河朔上流禮接邉鄰鎮靜方域非深沉不測其何以制逺御衆乎茍行事深淺動為人料其孰曰大賢君子乎其深沉也則宜矣既以是解之因從而語曰夫深沉不測則臨事好思臨事好思則心存默識今公誠如是則賢不肖進于前必有所取舍矣冝乎小人萌進見萬一之望焉敢用致書數百言于左右以為請見之禮俯伏棨㦸之下以俟進退之命閣下賜與之見則敢進見實旅人寒士之幸也不賜與之見孰敢求之見蓋羈薄之命不獲遇于大賢君子之知矣窮逹進退庶卜是日敢不惟所命之伏惟少賜憐察幸甚修恐懼再拜上頴州劉侍郎書月日某謹斋戒擇日裁書百拜有聞于密學侍郎閣下某竊惟哀矜惻隱君子之常心困迫飢寒小人之切患倘以小人困迫之患仰扣君子哀矜之心茍君子不聞則已其或聞之則必動于心大則必見于色當為咨嗟慘怛憫而矜之雖未知必假之大恩與否其無拒絶弗顧之理明矣某是以不敢疑懼期得訴于府庭之下庶窮悴之迹少獲布聞于左右如獲黷犯尊威之罪而難用默默自已者其勢與誠危且窮也某死罪死罪某以大中祥符𥘉竊進士第解褐為泰州司理參軍時年齒且少心壯氣鋭實不能與俗相俯仰謀為自全之道卒以是纍一旦挂于刑章毁官喪祿斥為敗具于今十年𥘉為池州參軍日屬所天奄殁朝廷以始得罪譴不許奔憂時國子博士辛公公之外舅也方為是郡哀其艱禍窮蹙特以事聞果允朝㫖聽其北還因獲生見老母稚弟于京師不然非辛公之力將以悲憂死諸江外常念辛公之賜厚矣某家園素來貧虛歸不足以給飬其生奉老母既茫然無依因即栖于京師亦無他圖以其都㑹之地平生遊舊或時得逢悲其窮者輒有分濟至將丐四方大抵取途似便以故久寓京師用不能出家雖寄托京城身常奔走道路老幼十口食于一身遑遑終歲且不能周其􅊡粥今春國家恩䛇特下失職尤纍之人許以自新由是某竊有祿食之望半年住京延伺一命雖室有十錢之物亦盡為薪米屋直之費無何二月之詔裁寢某嘗與十一人同詣宰相披告其下五人獨得從自新之典惟某六人復置散地但某受是命抑不敢不知幸焉文學掾古之美名汝隂郡今之善地守兹郡者復朝之重賢得古善地而事重賢信為幸矣然事有便于名而不便于實安于公而不安于私者雖聖人將不能以居焉某昨自趨府之後退伏逆旅舍中所相親者惟形與影每念年髙之親旁無兼侍計日所食殆絶而莫續念之至此則不覺心目俱斷涕霑于襟將為之奈何因自謂曰憂思無益也今為孤親之計莫如直以誠言于旌斾之下使重賢君子察而知之然後乞告歸飬以慰倚門悽悽之望將無不可者故官無職事所守俸不救于口腹頴上昔未嘗逰足無可及之門是乃真群中之長物耳久留此將不難死于窮餓一身窮餓而死可也如老母何如幼稚何是以不得不以誠而自陳所謂以小人困迫之患扣君子哀矜之心識者必不謂之逆理而動惟寬明仁惻矜而察之優而容之不加大罪則生死幸甚情志殞迫辭無緣飾干冒尊聽憂灼失措某頓首上監判郎中書月日具官某謹拜手書于監判郎中執事某為兒童歲多依外門祖氏家由是得服執事之名久矣逮十歲許從先君官南北則不常其居年已長即入舉子場干時求進為人事羈束皇皇汲汲至于今不獲一拜盛德于左右往年見先君聞執事拜官寵澤優渥時謂某曰昔日汝外王父屢與吾言及其僚友家子弟敦偉可器量者獨曰邢君久逺職位不同吾輩幸記之今誠驗其語汝外王父可謂知人吾為太學生時亦嘗辱邢君逰他日汝見之必修子姪禮小子奉是言不敢遺忘于時某方再舉于有司雖一名似失所望其后選授泰州司理參軍區區曺椽未終秩而釁禍繼作所天奄喪艱苦無訴去冬適自南歸一家貧寄京師薪米不給老幼數口嗷嗷待哺相視未定旋奔走于外以謀其食越春涉夏無時少息所以未遑遑見于執事者蓋此也近日思京城都㑹之地茍無俸入儲蓄之偹未易久居方謀今秋將家還汶上鄉里葺先人故田以奉老母之膳因自為息身之計既如此即執事之門愈將無及矣重念先人忝執事疇昔之舊不能當此時一請見門下是自取踈外于長者而不行先君往歲之命也前數日竊不度量遂造于門館既獲以名通伺命遷延間䝉執事辭以他故徨引退愧生于顔歸自思之曰執事所以拒而不見者責其進謁之晚故也執事其實未盡察知亦冝乎責之以晚也某又豈敢以不見望于執事雖然苟默而不以言自辨其所以進謁之晚之故則是終得罪于長者足以為恥今盤桓忸怩數日而復進其言庶幾執事覽其言而盡賜察知或哀以故人子而命之見則復敢以見如不命以見則終不敢見惟執事亮之不宣某再拜序唐栁先生集後序唐之文章𥘉未去周隋五代之氣中間稱得李杜其才始用為勝而號雄歌詩道未極渾偹至韓栁氏起然后能大吐古人之文其言與仁義相華實而不雜如韓元和聖德平淮西桞雅章之類皆辭嚴義密製述如經能崒然聳唐德于盛漢之表蔑愧讓者非先生之文則誰與豫少嗜觀二家之文常病栁不全見于世出人間者殘落才百餘萹韓則雖其全至所缺墜忘字失句獨于集家為甚志欲𥙷其正而傳之多從好事訪善本前後纍數十得所長輒加注竄遇行四方逺道或他書不暇持獨齎韓以自隨幸㑹人所寶有就假取正凡用力于斯已蹈二紀外文始幾定久惟栁之道疑其未克光明于時何故伏真文而不大耀也求索之莫獲則既已矣于懷不圖晚莭遂見其書聨為八九大編䕫州前序其首以卷别者凡四十有五真配韓之巨文與書字甚朴不類今跡蓋往昔之藏書也從考覽之或卒卷莫迎其誤脫有一二廢字由其陳故劘滅讀無甚害更資研證就真耳因按其舊録為别本與隴西李之才參讀纍月詳而后止嗚呼天厚豫者多矣始而饜我以韓既而飫我以栁謂天不吾厚豈不誣也哉世之學者如不志于古則己茍志于古則踐立言之域舍二先生而不由雖曰能之非余所敢知也送李秀才歸泉南序景德四年與泉州進士李君相識于京師逰處且久于時豫與李君俱少年有壯志􅍾𥿄茟入都省應主司之試躍躍有矜負之色窺科級跋仕進自期待者甚鋭明年春不幸則皆無成以罷後月餘遂各去京師而歸其居地既逺且絶不相聞知如是别者十一年復㑹于京師得一舉酒而相歡對一語及往舊事恍焉不啻如夢面老而心衰則相與皆然也豫中間雖僅成一名今又失其祿食子則猶舉于進士場中嗟乎豫與子向之志願百莫從其一二而意能度十已亡其六七信乎人物于天地間甚易老且死耳别十一年而一相聚顧昨日之少壯忽已凋耗今聚未久而復别别聚茍又加如是知他日之相視復不如今辰之視昔時也必矣今子别我而歸我眷眷不能已者以其故人也其俱不得志也其相逺而難相聞也其㑹之或賖于前也其將為之奈何請且序情而歌事以為子送詩云閩越子所家告以歸期征行語黯將發憤氣一作意鬱以盈男兒志未就口腹常不營胡為京城中日與芻豢爭隋河二月路栁色傷逺行十千大梁酒金罍為君傾酒酣微悲歌衆坐皆聳驚去矣丈夫别安事兒女情張當字叙春秋之法書字為褒有以知君子之尚其字也然則古之名與字必相配字者所以表名也清河張君名始字友直猶以其取義未安也而訪之僕辱其久逰不獲讓為一作焉徐思之因請更字曰元膺方前字于義為洽而又正與名㑹且元為長善則仁義統稱士能膺之行孰大焉張君以辭學纍舉進士始得明之定海尉祿雖畢才不踰一作其職與其位甚尊而才甚愧者孰賢愚焉豫既為述其字又以勉其行故為之序送魯推官赴南海序為人之佐其難矣哉夫令而行之者其長之所專也從而輔之者其佐之所守也凡政有害于公有悖于理知而必言此已所可為爾言而必從豈己之所能哉茍上無必從之則政有必失之患為其佐者罪先及之故曰為人之佐其難矣哉然則如何其可也當直而輔之輔與正非已之職歟正之而不從則雖獲罪乃有之矣于其職也實無愧焉今之從事于二者或莫率是道不涉于欺則陷于隨居上者其人果賢其政果明是冝順之于下以成其美已則曰我為人佐遂無一為之損益吾何以食其官即强白黑以分亂之此非欺而何居人上者其人果不賢其政果不明是冝直之于下以救其過已則曰我為人佐言不吾取事不吾􅌹力與為敵徒速悔纍曷若附離唱和取容免責茍全吾位而去此非隨而何豫謂士之居其位事其人既不可欺亦不當隨不欺不隨惟職所冝而已矣魯以辭學中名自邑佐而遊郡幕皆有所稱今將復佐于南海南海際南之巨府也方聞其長則天子諫臣賔接僚屬當奬正與直用是知志必上行茍上下協公以從于理豫見南海之政獨追于古而荒夷之民大浹其惠也送李秀才應陳州舉序陳許于京師猶唐之視同華實四方藩輔之府來鎮其地者常自大官出故每貢士歲進士獲送名于書者其榮與王府偕上之四年太傅隴西公領陳之二年也隴西公之賢時莫不聞禮才接善博收而廣納不以位望驕物四方之士走陳而獻藝求願日伏于門進士李生諷前一年嘗自蔡往以其業修請謁禮一見獲遇甚厚自是復歸探學尤至益有聞焉今兹歲㑹闢選舉生將韞挾其技舉于陳同儕輩欲生留于斯者或解以他語豫謂李生是舉往得冝者三焉隴西公喜能樂善固材駿所歸地首籓輔其名躅易發而光且復聞舊貫在焉有是三者可無行乎其戒子僕其秣子駒吾將餞子以壺而送子諸途送吕公𥘉序為善汲汲于報報未至則更而去之末哉學者能顯窮一致蹈道自樂而不變庶幾君子之志者邪與其逹而安不若困而固之之難也公𥘉生于儒門庭聞道為名進士十五年僅然獲一苐後數歲始選得州參軍日趨走塵土職下賤事充充乎貌顔未常為可憐之意豫知其道固于內外物不得間而入也不然豈免誹怨呻呼駴躍發于中而表之也歟居職踰年以家艱去之蘇豫重其别先行以告曰慎無中廢則豐報且將及豈惟寬𥙿于賤用哉送崔伯盈序士困窮而䔍于學庶民困窮而䔍于利學卒利亦久且博哉或泰于交或𢾗世而弗斬焉庶民日嬴日陷若坳坎聚潦不注則涸故少息則怠及學之利也蓋異于是焉伯盈䔍于學者也三十年而益困未知所以為利今歲䛇罷舉妻死身病孑單母寄海上思侍以孝之道用不能往因射他州之有無者居諸槖將自頴川之伊洛走奏中都浮茛蕩波龍藏泊過姑蘇入吳興出谷水寧省于東安少進于越抵句漏圖庶民之利者將行豫慮君幹于貨而落于學故序庶民之道以告焉河南穆公集卷第二
