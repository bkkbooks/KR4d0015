  text: 河南穆公集􅃃第二
  hash: sha256:ab8b3841089417e7bea4cb80e923ff387c2d071f15c70591dbe7519add49d88c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0015_SBCK_002-1a}
body:
  text: 穆脩伯長書荅喬適書月日河南穆脩白秀才足下近辱書并示文十萹終始讀其命意甚髙自及淮西來嘗見人言足下少年樂古文固耳聞而心存之但未敢輙􅁿信人説今遂果知足下能肰盖古道息絶不行于時已乆今世士子習尚淺近非章句聲偶之辭不置耳目浮􅁤濫轍相跡而奔靡有異途焉其間獨敢以古文語者則與語怪者同也衆又排詬之罪毁之不目以為迂則指以為惑謂之背時逺名闊于冨貴先進則莫有譽之者同儕則莫有附之者其人茍無自知之明守之不以固持之不以堅則莫不懼而疑悔而思忽焉且復去此而即彼矣噫仁義忠正之士豈獨多出于古而鮮出于今哉亦由時風衆势驅迁溺染之使不得従乎道也􅀚足下十萹之文則信有志于古文矣其書之問則曰􅀅斈于今則慮成淺陋􅀅文于古則惧不取名于世學冝何㫖引韓先生師説之説以求觧惑為請足下當少秀之年懐進取之机反斈古于仁義不勝之時與之者寡非之者衆不得无惑于中焉是以枉書見問某不才而棄于時者也何足為人盾其是非可否徒以退拙無所用心因得従事于不急之文如舊者不識其愚且戅或謂之為好古焉故足下以是厚相期待者盖感其声而求其􅀋乎可不少復其意耶試為足下言之夫斈乎古者所以為道文乎今者所以為名道者仁義之謂也名者爵禄之謂也然則行道者有以兼乎名中名者無以兼乎道何者行夫道者雖固有穷逹云耳然而逹于上也則為賢公卿窮于下也則為令君子其在上則礼成乎君而治加乎人其在下則順悦乎親而勤修乎身窮也逹也皆夲于善称焉守夫名者亦固有窮逹云耳而皆反于是也逹于上也何賢公卿乎窮于下也何令君子乎其在上則無所成乎君而加乎人其在下則無所悦乎親而修乎身窮也逹也皆􅄐于善称焉故曰行道者有以兼乎名守名者無以兼乎道有其道而无其名則穷不失為君子有其名而無其道則逹不失為小人與其為名逹之小人孰若為道窮之君子矧窮逹各繫其時遇豈古之道有負于人耶足下有志乎道而未􅁯乎名樂聞于古而喜求于今二者之心茍交存而無擇􅀅懼純明之性寖㣲浮躁之氣驟勝矣足下心明乎仁義又學識其歸向在固守而弗離堅持而弗奪力行而弗止則必立乎名之大者矣學之正偽有分則文之指用自得何惑焉不宣某白上大名陳􅀚察書􅀚察閣下脩嘗病近世以來文武異道􅀅相異材為􅁦于時乆矣古之所謂文武之道盖一道也但治亂之用殊所謂􅀅相之才皆通材也由出處之􅀉異未有不逹􅁠謀而名能相國者未有不明學術而名能􅀅兵者則古之取􅀅相也率由文武之道一焉近世則不然謂儒為文謂卒為武茍登之為相矣則不復􅀉以軍武之任而曰此文人也不足語以武茍㧞之為􅀅矣則不求以儒術之學而曰此武夫也不當責以文時既擇􅀅相之具不同人遂目文武之術為異時之所以不得其人人之所以不盡其用其􅁦皆出于此乎脩當願識如古之賢傑之人文究􅀴綸武洞􅁠變弛張諧物理動静應机㑹陽開隂合與􅄦神造化争其功用無所施而不得者如此之人逢其時運其才出入乎文武􅀅相地使剛粗匹夫号名主􅀅者􅀚之聞之色死氣䘮俯首聼命知􅀅帥之道不在于彼而在吾儒也豈不􅊆哉求之當今他未􅀗覩惟服閤下之才徳風畧于斯有年矣伏惟閤下名極而望峻識淵而量閎視􅂦甲之第于當年若掇遺物之易蹈霄漢之衢于平昔如馳坦途之速周歴清美深集禁宻言蔚典冊茟動雲雨嘗斯之時天下之人共言閤下之文章真辭臣矣一旦奉明詔去内廷統􅀅符分亷問奠枕攸􅀝来藩北門命下之辰威聲四出當斯之時天下之人又言閤下之氣畧真帥矣天下之所以稱之如彼者何如此者何非私言也抑以閤下之才全能鉅無施不稱文徳武偹靡不在躬也附衆却敵靡不如意也以是而天下言之耳然則雖古之賢傑復生諒何以加此脩可不向風馳想氣激神竦求一識大賢之子之風采忽不自知其貧且賤嬴粮躡屩來及魏都亦既至止復徬徨蹢躅不敢􅈳進則訪謀于諸府僚従事或有言曰公性􅃊急難犯也或曰公性深沉不測也始聞之甚懼且疑徐念之則悟以觧曰彼言公􅃊急難犯者其非也公方負天下文武之望以賔接士大夫為切務頋肯肆􅃊急難犯之性損其容納度量乎斯不然矣彼曰深沉不測者冝有之凡大賢君子動作施為皆不使人窺其涯畔今公柄囯重任殿河朔上流礼接邉鄰鎮静方域非深沉不測其何以制逺御衆乎茍行事深淺動為人料其孰曰大賢君子乎其深沉也則宜矣既以是觧之因従而語曰夫深沉不測則臨事好思臨事好思則心存黙識今公誠如是則賢不肖進于前必有所取舎矣冝乎小人萌進見萬一之望焉敢用致書数百言于左右以為請見之礼俛伏棨㦸之下以俟進退之命閤下賜與之見則敢進見實旅人寒士之幸也不賜與之見孰敢求之見盖覊薄之命不􅀗遇于大賢君子之知矣窮逹進退庻卜是日敢不惟所命之伏惟少賜怜察幸甚脩恐惧􅂯拜上頴州劉侍郎書月日某謹斋戒择日裁書百拜有聞于宻學侍􅀰閤下某窃惟哀矜惻隐君子之常心困廹飢寒小人之切患倘以小人困廹之患仰扣君子哀矜之心茍君子不聞則已其或聞之則必動于心大則必見于色當為咨嗟􅆭怛憫而矜之雖未知必假之大恩與否其无拒絶弗頋之理明矣某是以不敢疑惧期得愬于府庭之下庻穷悴之迹少􅀗布聞于左右如􅀗黷犯尊威之罪而難用黙默自已者其势與誠危且穷也某死罪死罪某以大中祥符􅀄窃進士第觧􅄄為㤗州司理􅂙軍時年歯且少心壮氣銳寔不能與俗相俛仰謀為自全之道卒以是累一旦挂于刑章毁官䘮禄斥為敗具于今十年􅀄為池州􅂙軍日属所天奄殁朝廷以始得罪譴不許奔􅁨時囯子􅀶士辛公公之外舅也方為是郡哀其艱祸窮蹙特以事聞果􅁢朝㫖聴其北還因􅀗生見老母稚弟于京師不然非辛公之力􅀅以悲􅁨死諸江外常念辛公之賜厚矣某家園素來貧虚歸不足以給飬其生奉老母既􅃼然無依因即栖于京師亦無他圖以其都㑹之地平生㳺舊或時得逢悲其穷者輙有分濟至􅀅丐四方大抵取途似便以故乆寓京師用不能出家雖􅀉托京城身常奔走道路老幼十口食于一身遑遑終􅀊且不能周其􅊡粥今春囯家㤙􅇉特下失職尤累之人許以自新由是某窃有禄食之望半年住京延伺一命雖室有十錢之物亦盡為薪米屋直之費無何二月之詔裁寝某尝與十一人同詣宰相披告其下五人獨得従自新之典惟某六人復置散地但某受是命抑不敢不知幸焉文斈􅁺古之美名汝隂郡今之善地守兹郡者復朝之重賢得古善地而事重賢信為幸矣然事有便于名而不便于寔安于公而不安于私者雖圣人􅀅不能以居焉某昨自趨府之後退伏逆旅舎中所相親者惟形與影每念年髙之親旁無兼侍計日所食殆絶而莫續念之至此則不􅁴心目俱断涕霑于􅁭􅀅為之柰何因自謂曰􅁨思无益也今為孤親之計莫如直以誠言于旌斾之下使重賢君子察而知之然後乞告歸飬以慰􅀝門悽悽之望􅀅無不可者故官無職事所守俸不救于口腹頴上昔未嘗逰足無可及之門是乃真群中之長物耳乆留此􅀅不難死于穷餓一身穷餓而死可也如老母何如㓜稚何是以不得不以誠而自陳所謂以小人困廹之患扣君子哀矜之心識者必不謂之逆理而動惟寛明仁惻矜而察之􅄖而容之不加大罪則生死幸甚情志殞廹辭無縁餙干冐尊聴􅁨灼失措某頓首上監判􅀰中書月日具官某謹拜手書于監判􅀰中执事某為児童􅀊多依外門祖氏家由是得服执事之名乆矣逮十􅀊許従先君官南北則不常其居年已長即入㪯子塲干時求進為人事覊束皇皇汲汲至于今不􅀗一拜盛徳于左右徃年見先君聞执事拜官􅃂泽􅄖渥時謂某曰昔日汝外王父屡與吾言及其僚友家子弟敦􅊆可器量者獨曰邢君乆逺職位不同吾軰幸記之今誠騐其語汝外王父可謂知人吾為太斈生時亦嘗辱邢君逰他日汝見之必修子姪礼小子奉是言不敢遺􅁯于時某方再㪯于有司雖一名似失所望其后選授㤗州司理􅂙軍區區曺椽未終秩而釁祸継作所天奄䘮艱苦無訴去冬適自南歸一家貧􅀉京師薪米不給老㓜数口嗷嗷待哺相視未定旋奔走于外以謀其食越春渉夏无時少息所以未遑遑見于执事者盖此也近日思京城都㑹之地茍無俸入儲蓄之偹未易乆居方謀今秋􅀅家還汶上郷里葺先人故田以奉老母之膳因自為息身之計既如此即执事之門愈􅀅無及矣重念先人忝执事疇昔之舊不能當此時一請見門下是自取踈外于長者而不行先君徃􅀊之命也前数日窃不度量遂造于門舘既􅀗以名通伺命遷延間䝉执事辭以他故徨引退愧生于顔歸自思之曰执事所以拒而不見者責其進謁之晩故也执事其寔未盡察知亦冝乎責之以晚也某又豈敢以不見望于执事雖然苟黙而不以言自辨其所以進謁之晚之故則是終得罪于長者足以為恥今盤桓忸怩数日而復進其言庻幾执事覧其言而盡賜察知或哀以故人子而命之見則復敢以見如不命以見則終不敢見惟执事亮之不宣某再拜序唐栁先生集後序唐之文章􅀄未去周隋五代之氣中間称得李杜其才始用為勝而號雄􅁔詩道未極渾偹至韓栁氏起然后能大吐古人之文其言與仁義相華寔而不雜如韓元和聖徳平淮西桞雅章之􅀋皆辭􅃊義宻製述如􅀴能崒然􅋍唐徳于盛漢之表蔑愧譲者非先生之文則誰與予少嗜􅀚二家之文常病栁不全見于世出人間者殘落纔百餘萹韓則雖其全至所缺墜􅁯字失句獨于集家為甚志欲􅀘其正而􅀓之多從好事訪善本前後累数十得所長輙加注竄遇行四方逺道或他書不暇持獨齎韓以自随幸㑹人所寳有就假取正凡用力于斯已蹈二紀外文始幾定乆惟栁之道疑其未克光明于時何故伏真文而不大耀也求索之莫􅀗則既已矣于懐不圖晚莭遂見其書聨為八九大編􅇪州前序其首以􅃃别者凡四十有五真配韓之鉅文與書字甚朴不􅀋今跡盖徃昔之藏書也從考覧之或卒􅃃莫迎其誤脱有一二廢字由其陳故劘滅讀无甚害更資研證就真耳因按其舊録為别本與隴西李之才参讀累月詳而后止嗚呼天厚予者多矣始而饜我以韓既而飫我以栁謂天不吾厚豈不誣也哉世之學者如不志于古則己茍志于古則踐立言之域舎二先生而不由雖曰能之非余所敢知也送李秀才歸泉南序景徳四年與泉州進士李君相識于京師逰處且乆于時予與李君俱少年有壮志􅍾􅁓茟入都省應主司之試躍躍有矜負之色窺科級􅉥仕進自期待者甚銳明年春不幸則皆無成以罷後月餘遂各去京師而歸其居地既逺且絶不相聞知如是别者十一年復㑹于京師得一舉酒而相􅂬對一語及徃舊事怳焉不啻如夢􅆕老而心衰則相與皆然也予中間雖僅成一名今又失其禄食子則猶舉于進士塲中嗟乎予與子向之志願百莫從其一二而意能度十已亾其六七信乎人物于天地間甚易老且死耳别十一年而一相聚頋昨日之少壮忽已凋耗今聚未乆而復别别聚茍又加如是知他日之相視復不如今辰之視昔時也必矣今子别我而歸我眷眷不能已者以其故人也其俱不得志也其相逺而難相聞也其㑹之或賖于前也其􅀅爲之柰何請且序情而􅁔事以爲子送詩云閩越子所家告以歸期征行語黯􅀅􅀤憤氣一作意欝以盈男児志未就口腹常不营胡爲京城中日與芻豢争隋河二月路栁色傷逺行十千大梁酒金罍爲君傾酒酣㣲悲􅁔衆坐皆聳驚去矣丈夫别安事児女情張當字叙春秋之法書字為褒有以知君子之尚其字也然則古之名與字必相配字者所以表名也清河張君名始字友直猶以其取義未安也而訪之僕辱其乆逰不􅀗譲為一作焉徐思之因請更字曰元膺方前字于義為洽而又正與名㑹且元為長善則仁義統稱士能膺之行孰大焉張君以辭學累舉進士始得明之定海尉禄雖畢才不踰一作其職與其位甚尊而才甚愧者孰賢愚焉予既為述其字又以勉其行故為之序送魯推官赴南海序為人之佐其難矣哉夫令而行之者其長之所專也從而輔之者其佐之所守也凡政有害于公有悖于理知而必言此已所可為爾言而必從豈己之所能哉茍上無必從之則政有必失之患為其佐者罪先及之故曰為人之佐其難矣哉然則如何其可也當直而輔之輔與正非已之職歟正之而不從則雖􅀗罪乃有之矣于其職也實無愧焉今之從事于二者或莫率是道不渉于欺則䧟于随居上者其人果賢其政果明是冝順之于下以成其美已則曰我為人佐遂無一為之損益吾何以食其官即强白黑以分亂之此非欺而何居人上者其人果不賢其政果不明是冝直之于下以救其過已則曰我為人佐言不吾取事不吾􅌹力與為敵徒速悔累􅂚若附􅄐唱和取容免責茍全吾位而去此非随而何予謂士之居其位事其人既不可欺亦不當随不欺不随惟職所冝而已矣魯以辭學中名自邑佐而㳺郡幕皆有所􅁛今􅀅復佐于南海南海際南之鉅府也方聞其長則天子諫臣賔接僚属當奨正與直用是知志必上行茍上下恊公以從于理予見南海之政獨追于古而荒夷之民大浹其惠也送李秀才應陳州舉序陳許于京師猶唐之視同華實四方藩輔之府来鎮其地者常自大官出故每貢士􅀊進士􅀗送名于書者其荣與王府偕上之四年太傅隴西公領陳之二年也隴西公之賢時莫不聞禮才接善􅀶􅀵而廣納不以位望驕物四方之士走陳而献藝求願日伏于門進士李生諷前一年嘗自蔡徃以其業修請謁禮一見􅀗遇甚厚自是復歸􅊥學尤至益有聞焉今兹歳㑹闢選舉生􅀅韞挟其技舉于陳同儕軰欲生留于斯者或觧以他語予謂李生是舉徃得冝者三焉隴西公喜能樂善固材駿所歸地首籓輔其名躅易􅀤而光且復聞舊貫在焉有是三者可無行乎其戒子僕其秣子駒吾􅀅餞子以壺而送子諸途送吕公􅀄序為善汲汲于報報未至則更而去之末哉學者能顯窮一致蹈道自樂而不變庻幾君子之志者邪與其逹而安不若困而固之之難也公􅀄生于儒門庭聞道為名進士十五年僅然􅀗一苐後數􅀊始選得州参軍日趨走塵土職下賤事充充乎貌顔未常為可憐之意予知其道固于内外物不得間而入也不然豈免誹怨呻呼駴躍􅀤于中而表之也歟居職踰年以家艱去之蘇予重其别先行以告曰慎無中廢則豊報且􅀅及豈惟寛􅁉于賤用哉送崔伯盈序士困窮而䔍于學庻民困窮而䔍于利學卒利亦乆且􅀶哉或㤗于交或􅂾世而弗斬焉庻民日嬴日䧟若㘭坎聚潦不注則涸故少息則怠及學之利也盖異于是焉伯盈䔍于學者也三十年而益困未知所以為利今􅀊􅇉罷舉妻死身病孑单母􅀉海上思侍以孝之道用不能徃因射他州之有無者居諸槖􅀅自頴川之伊洛走奏中都浮茛蕩波龍藏泊過姑蘓入吴興出谷水寕省于東安少進于越抵句漏圖庻民之利者􅀅行予慮君幹于貨而落于學故序庻民之道以告焉河南穆公集􅃃第二
