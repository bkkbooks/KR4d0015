  text: 河南穆公集卷第一
  hash: sha256:6d157aa038881693e0054373bf28c74f163d49f99caa98ae7ab7528e66ad6824
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0015_SBCK_001-1a}
body:
  text: 穆脩伯長詩江南寒食江城水國春光饒清明上已多招邀花隂連絡春草岸桞色掩映紅欄橋歌調嘔啞雜吴俗髻鬟踈削傳南朝誰憐北客帰未去楚魄湘魂惟暗消送毛得一秀才歸淮上江天梅雨晝䔥䔥送别愁吟白紵謡處士才髙融未荐騷人魂断玉方招自傷櫪驥心千里空羡冥鵬志九霄酒罷征鞍迢逓去不堪回首木蘭橈君歸迢逓淮西路我客䔥條秋浦城惻惻相看復惻惻行行送别重行行途中猿鳥哀声断馬上雲山逺碧横冨貴窮通俱未决直傾樽酒沃離情食魚南有嘉魚異常趨四月期江天專伺至烟網宻争垂乍戯汀蘋末𥘉循水荇湄競揺輕舴艋寛罩碧漣漪占浦捜深藻空波岀素髭𢾗頭餘赤貭二色類銀姿貨鬻斯為切鮮腴敢暇知青錢邀價直華屋市新竒珠沬縁條煦霜鱗逐刅墮扣顱瓊聚骨剖腋錦分肌味佐芳菘惬香参苦笋冝羹甌融膩玉膾筯罥一作縷寒絲湘鱓非吾偶河魴孰與夷荐新奚尚鮪稔毒即殊鱸訝休官易鯖嫌醒酒遅自當頻佐膳所惜易過時魯従事清暉閣庾郎真好事溪閣斬新開水石精神出江山氣色来踈烟分鷺立逺靄見帆廻公退資清㒷閑吟倚檻裁送葛源之太和主簿勿歎従卑位聊欣適去情愁風九月急飛鳥一帆輕鱠斫江鱗活杯甞楚醸清歡一作權華莫回首寵辱正堪驚送靈師歸吳靈師殊可尚頗不類浮屠托跡雖依佛留心獨喜儒風塵􅌒京洛水石隱勾吴破寺杉松老南歸舊隐孤江南春杜若谿邉待釣舡怨紅傷翠助鸝鵑戦回春事青蒲劍買破韶光緑荇錢千嶂逺圍芳草囯一江晴浸断霞天未知多感多愁客何處偷㝷甕底眠寒食江邉又寒食傖客柰離襟恨滿王孫草愁多望帝禽雞毬輕薄事歌酒宴㳺心盡付吴児軰惟知屏跡深江上送陳翹還無為江上寂寥春雨晴江边冉冉春潮平相逢未盡斗酒醉相送又速孤舟行篁竹窮鎖秋浦郡烟波渺隔無為城音塵両地不千里勿使負君金玉聲殘春病醒風簾窣窣燕哰哰卧對殘芳起欝陶乍困逰車一作鞍春尚在未扶醒枕日𥘉髙煩腸屡沃痟難觧病髪慵簮癢更搔欲為風光輕賦别正無憀頼染江毫書事斍菴惠澤涵濡四海同㣲生曽莫預昆虫不参品物陶鎔外獨作窮人盖載中深穽已顛犹磷石危苕将籜更推風一家寄命嗟無地何負明神與上穹和秀才江墅幽居好十首并序滎陽先生有墅在宣城之南陵尝作村居詩十首其詩用律格五言四韵每萹皆同上之一句元和長慶来詩人多是体生之徃還躡而和者𢾗人暨携北来出以相示予諷其萹而悦其事既恨未得徃従之㳺喜用其韵而継之得以盛言生所居之樂宣城寔江外之郡而墅且在焉因首用是句江墅幽居好當門看水田鳧鷗閑夕照秔稲秀原烟野屐無完歯山衣有敗肩遥聞双闕下簘鼓樂豊年其二江墅幽居好南塘枕野亭菰蒲顫風緑菱荇盖波清繋葦一魚艇翹烟双雪翎相携二三叟扶醉不曽醒其三江墅幽居好谿山𢾗里長徑通茶塢緑門枕橘其六江墅幽居好柴関帶竹籬田頭餉耕後樹裡灌園時鄰静鳴秋織樵閑對野棋抵巇非我事大咲引蘇錐其七江墅幽居好名山對九華踈篁十餘畆古屋两三家碓下雞争黍籬根虺逐蛙水边閑送目独鳥在秋槎其八江墅幽居好何妨鄙事添神随山父賽筮斈野燭一箔珠簾掩映垂房櫳清染麝香枝佳人盼影横哀柱狎客分光綴艶詩禁鎖翠明𥘉唱漏官窓紅短尚圍棋長宵且秉歡㳺去無限風情見古辞過西京西京千古帝王宫無限名園水竹中来恨不逢桃李日滿城紅樹正秋風賦催粧嚴粧應在綉閨中似閗春芳拆曉風試問夭桃臨碧沼何如艶質對青銅送孫立東㳺詩茟知名曽苦刻文章多難乆漂流睢陽縦酒黄金盡提劍東方暫一㳺村郭寒食雨中作寂寥村郭見寒食風光更着㣲雨遮鞦韆閑垂愁稚子楊桞半􅊜眠春鴉白社皆驚放狂客青錢盡送沽酒家眼前不得醉消遣争奈惱人紅杏花清明連上已改火清明度湔衫上已連芳辰來属續㳺事困聨翩酒帳經旬直花司併日權侠児狂不足犹恨促春妍合歡芍藥薰風對坼香心破浩露双滋粉面新油壁車中同載女菱花鑑裡並粧人皇英帝子鍾遺艶琬琰宫姬托後身誰道獨呈芳瑞晚也勝常調牡丹春故侯園池舘早来瓦䃯存路傍看取故侯園身前便作荒凉計秪樹芳菲不樹㤙送定師南㳺营营斈佛徒皆喜訾吾道怜師独異群儒藝知探討誦詩三四章徃徃見辞藻玉璞在琢磨不難成至寳知予夲好古身服仁義老勤請送行詩安足慰枯槁别時汝頴路凉葉驚秋早南㳺何當還江潭無限好送人主邉寨豈惮河湟逺男児效主㤙穷边人不到孤戍自分屯馬放胡沙暖𤇺傳塞日昏軍前𥘉謁帥戎服走轅門巨盗嗣皇登位始凝旒巨盗尋并相印收漢室有灵誅賊兾舜廷无患放凶兠猨狙豈称周公任豺乕犹寛巷伯投願斬都衡謝天下不然何用正王猷汝隂偶書呈一二知巳汝隂窮椽計何踈四十無成坐諷書不務功名師禆𥙷買切闔独将仁義守蘧庐敢同賈傅希前席况異鄒生托後車除泥諸公時一醉等閑犹且忘歸歟除夜燈前清泪落衣間守歲分為客是閑老母今春年七十壽觴争忍對慈顔城南五題郊歩野水岸邉逢草歇平林烟畔逐花行雨晴南陌塵埃洗倍覺風光奪眼明獨㳺水曲林幽獨杖藜郫筒香入亂花携輕肥不得㝷春意動要笙歌逐馬蹄貴侯園名園雖是属侯家任客閑㳺到日斜冨貴位高無暇出生人空看折来花朱亥墓閑登朱亥㳺侠墓郤望梁王歌吹䑓䑓上墓邉芳草緑㳺人心事立徘徊玉津園君王未到玉津㳺萬樹紅芳相倚愁金鎖不開春寂寂落花飛出粉墻頭燈杳杳有時當永恨依依何處照閑眠静臨客枕愁寒雨逺逐魚蓬秋瞑烟纎影乍欹還復立冷花時結不成圓銷魂猶憶江樓夜曽對離觴賦短萹登莒子䑓莒國丘壠在莒䑓荆棘深􅑀高一極目懐古重傷心平楚蒼烟瞑遇風白日沉誰論客懐抱灌木自悲吟希言官舎種花纔𥘉看君栽小園已報新花着桃李感時睠物情何多發咏長萹託興比為言桃李富華寔君子盛徳尤所似蔳蔳相倚臨芳辰輔導春功如宰揆旁有百卉争妍舒特煩化匠施劂剞刻縷也上居月反下居綺反誇紅閗紫亦可怜各事繁華一時尔繁盛寕将此花同令人慕翫狂不已羲和奔御催春歸祗得衘杯且歡喜君看灼灼枝上英半雜泥塵成落蕊盛衰不獨草木然人事悠悠盡如此登女郎䑓䑓前流水眼波明䑓上閑雲鬂葉輕莫把姑蘓逺相比不曽亡國只傾城其二女郎名字夲風流好與州人作勝㳺倘使此䑓呼醜女汝隂城裡一荒丘友人燒筍之約未赴乆約燒林筍何時㑹勝園未嘗清氣味每厭俗盤餐漸痛烟犀老方憐露錦繁如何玉川子苦惜箨龍冤别榖熟尉李七同年騎馿登縣門屑屑復何言留舘竺乹舎屡携梅福樽凶荒岐路梗氷雪歲時昏明日别君去依然蓬跡奔樊博士化州監塩監醝已非職况復極南之莫識州名化徒聞水渉灕樹驚人面果俗駭鳥言夷去去惟强飯歲還歲可期丙寅春雨天地開春暉群隂争閉之行行二月路寒威切人肌淫雨恣凌虐淹旬下無時頑雲掃復合直向平地垂蒸人共愁歎萬物皆瘡痍衆木有芳華摧沮不得施青苞斂絳蕚同向枝上萎民麦悲已病泥中聊参差嘉穀失播種雖晴諒胡為蠢彼田中氓豈惟念身飢州縣責常賦嗷嗷訴之誰幸不為盗起多應盡流離吁哉致此異其咎安所尸悒悒窮巷士屏身伏茅茨讀書抗前古得失心頗窺天理不難䆒可以人事知且欲上其説懼非已所冝有職彼尚黙未當僣汝卑勉汝無妄言言出祸汝随誰識此懐抱獨自空嗟嘻贈適公上人喜得師消耗従僧問不休苦吟成白髪多病寄滄洲道氣閑尤勝書鋒晚更遒相思二千里阻别十三秋六合劳生耳休追萬事不雲羅荒舊隐知友落新丘想歎歐生逝應聞李氏憂師曩受國子愽士李公深遇寔與其子之竒相好李博士去予得无悼念㝷思祗如此必竟欲何求未即無言問方期勿藥瘳終為嵩少約築室共夷猶走乆有嵩少之志去将有期同欲招師而偕徃也一百五日同周越陳永錫㳺吉祥僧舎痛飲方期𢾗百杯尋芳何事又空回花愁酒困春無着却訪野僧䔥寺来題李士言秀才别貯帕蘭薰麝裛輕綃帕畧許携持又索還題破白雲深有意要傳消息到巫山南陌南陌一雨後東風三月天殘花亂芳草輕絮散春烟景色真愁絶歡悰重棄捐倀倀有餘恨􅙩醁詎能蠲雨中牡丹萬金期勝賞三月破穠芳妬忌巫娥雨摧殘洛苑香怨啼甄后玉寒出貴妃湯掩斂無聊極誰来替断腸思邉去年何時君别妾南園緑草飛蝴蝶今歲何時妾憶君西山白雪暗秦雲玉関此去三千里欲寄音書那可聞聞報自崕徙雷成一章従来崕貶断還期聞徙警雷衆共疑却訝有虞刑政錯四凶何事不量移秋浦㑹遇并序大中祥符五年為海陵郡司理参軍居職以不能俛仰自全不幸為奸人所伺誣搆以事囙𬒳罪南謫為池州参軍貶斥中且聞所天之艱朝廷以罪犯不許奔哀窮冤悲苦生人所寄一室于浮屠宫闔户日外絶還徃留歳餘遇赦聼以所釁聞将示之宥俱待命者有前泗州録事参軍清河張木亦受譴來是州前赦一月至與之居泊比接既相吊語且悲且歡張君簡篤有文信義人也自是㳺處以日両盡欵慰若忘窮否之為尔予自至以艱憂中自不復視文字矧為聲偶之辭乎逮此竊有北歸望且感張相遇憂患間因思非言無厥事聊用拾之為長詩一千二百言匪以言詩也攄憤悒之辭也池州古秋浦地命為秋浦㑹遇詩云齪齪幽遐地栖栖㑹遇人窮愁艱理勝覊旅易情親豈意當漂謫兹諧卜並鄰温温窺表粹晏晏奉嬉嚬直道談端闢横流語下堙綺文何斐亹瑰行亦璘玢敦分𥘉投漆交言乍飲醇􅍾心忠義合開口肺肝陳共昧随時理俱成迷患因祸来非造次語及自酸辛衆奮漂山舌孤縻坐獄身詆誣惟腷臆鍜錬止逡廵囚任棺桐躍冤寕斗劍伸君牽一作愆成狠翟張君之冤由翟淳者深鍜錬其獄而成之我患御名姦秦秦應者夲以嶺南小吏承挕州縣乆而得真命官年七十餘通判是州為人狡多刻多疑納群細之譖以余甞輒慢之㑹守郡者疾病諸従事皆他適得乆􅌹郡事遂與其下予之祸巧縦銛刀茟幽争誷鬼神精誠懐皎日悲憤貫高旻素誓端清檢期無取玷淪斬芻嘗鼓箧卧藁先書紳側璧疑曽辨鈎金法所循得情奚示喜伏念不忘旬粗評評去声三章直何辭一馬貧决曺誠自任今之司理参軍盖古之決曺也司舉仰誰論録事参軍唐亦号司舉従事􅈾破藏奸柱綱埋剪暴輪存心固慨慕有位敢希遵驥騄程𥘉發虹蜺氣未振沮磨圭失色萋菲錦争新肯或竒虚刄翻成害寔賔木招孤秀伐珠掇闇投嗔跖蹻同非圣敦犨衆忌洵棘心終妬蕙蓬首不羞螓冶媚皆貍貉跳梁並狡㕙不無嫌虎據的是悪鷹暽合力邪攻正連謀偽訾真蝇声移枯楬渠列切蟻漏垫嶙峋扺玉為凡䃯摧松作弊神椎埋眢直墮排陷堵潜填卑􅊜終投誼愁憂遂放均籲辜賖盖幙照覆隔蟾踆流落穷山崦夷犹積水垠望家惟霣泣向國祗低顰艱毒天崩祀譴中聞朝邑府君凶訃邅危歳在辰以丙辰歲正月至貶所庭闈偏屺岵伯仲邈瓛璡媿未鴟夷死漸如渾敦嚚睢盱揺尾獸宛轉曝腮鱗歎棲遅郡尤居寂寞濵土風傳細碎心事遭凶屯郭周援人烟簇野津賈檣通劲越啇颿扶泛切吹船進徹甌閩谿婦收菰米村娃貨竹薪廻頭波渺渺動石磷磷再見來巢乙玄鳥也頻聞入市寅虎每入居人搏去滿林垂嘨狖當面走驚麕水寺傳将乆沙禽欲馴無心従碌碌任志守諄諄早作慵洮盥宵眠歎呻机床閑茟格窓牗亂書筠舊葛那支暑貧續晨未嘗逰井閈况復出城闉悒悒危腸潰昏昏病目瞤梅蒸衣醭黦瘴觸面黧皴未免雞猜鶴徒希鵲庇鶉素鵝求庾悦碧鸛事韋詵詎識開三雅奚誰指一囷歡無官局事病免府趨塵避路深藏拙忘机獨任純鳶輕飢鸑鷟駑誚瘦麒麟瑕謫連城寳驚疑照席珍泥蟠蚖肆若塗曵蝘嘲頻机弛千鈞絭音眷剛摧百錬􅣱愠憂冝悁悁讒吠更狺狺漸豆多聞耳全膠欲語唇巳甘鍾律唖難閗釡雷震平近歎非辜者還稱𬒳譴臻堪持言自觧姑以命相詢頓斍窮通外殊驚得䘮冺平豈煩懐魯汶并説忘岐豳兹共追随日時逢物景春雜花明浦嶼細草梁郊畛音珍綉羽来穿栁粧鬟去採蘋畫舡江汎汎銅鼓野鼘鼘于巾切荷芰卷生渚蕪菁秀出壣音鄰叢暄茶正發秧暖稲𥘉勻逺去㝷芳徑閑留坐翠瀕小蛮聊倒榼獨繭暫垂緍烟杪聞啼魄沙壖過祭獱道宫披古碣僧閣凭雕楯音循滯迹慙魚鳥梁䔥方等云吾嘗夢為魚因化為鳥方其夢也何楽如之及其斍也何優斯類良由吾不及魚鳥逺矣歸懐謝茗􅐜後魏王粛事南朝好茗飲又東蓴羹及北還又好羊酪或問茗何如酪曰酪與為奴尔誰怜秦逐客自恥晋縲臣斈憶居州里文曽力組紃曺倉祛秕稗任苑薙荆榛壮莭輕宗慤竒才轢卞彬賦豪摛藻繪詩墨洒玭琳始角詞塲勝争馳義轂轔戦瘤知景䧟盟手敢他捘傳云渉他捘衛侯之手捘音子寸切又七遵反勇俟邀圭爵功期取鼎茵郷書先鶚禰省荐半龍荀藝窃登廷試名叨擢帝宸闕嚴趨紫貝陛峻拜蒼銀變化𥘉飛壁埏和却在鈞三年紆選調一命就陶甄冗驟司囹圄卑纔服堧珉上寮非遂覇同列異超珣介立傍無援隂排宻有夤隄防雖少戅㙳坷亦多遜繳已能傷㕍罘仍未放麟踰年留異域肆㑹奉嚴禋仰聞蒼蒼理難窮蕩蕩仁良圖君未聘薄命我方湮蓬藋何當返蘭荃自可紉肴𬞞調㫖膳㫪税給租緍寄傲邱名麦遺荣野号莘退藏師李謐貴顯譲顔竣躡三高士追狂六逸民耕皐营酒秫樵谷訪琹槆畚上封花撥誅茅出果榛前音臻此音詵園中持銚挿林下設罝罠至理鵩齊鷃浮生􅌲等椿未甘捐糞土所幸曵絲綸南靣同尭禹巖廊即甫申固應容一叟鼓腹得還浮河南穆公集卷第一穆公集校補穆集無舊刻叢刊所收爲述古堂抄本印成又得朱氏暴書亭抄本與述古本異同甚多因據以作校語暴書亭本又多范陽祖無擇序一首亦補錄於後辛酉新春無錫孫毓修識河南穆公集序據朱竹垞抄本補范陽祖無擇擇之積於中者謂之道發於外者謂之文有道有文然後可以爲君子道有用舍文有否泰然用舍否泰在命不在道與文也君子不以其命之窮而輟於爲道道之不行而不廢於學文故雖身厄當時而名顯於後世者由此也河南穆公諱脩字伯長天平人少舉進士有名廣場中眞宗封泰山之年詔齊魯諸生以經明行脩公實在其選越三年就銓調補泰州司理參軍居職以直自任無與合者人皆憚忌率誣之罪遂貶池州再逢恩徙穎蔡二州爲文學椽卒爲後用明道元年秋九月終於家如公可謂命之窮道之不行也巳而未嘗廢文大凡有作莫不要諸聖賢而立言念諸仁義以爲質平時所見於簡策者殆踰數十萬言時人得之且愛且學及公之歿無擇求遺文於嗣子熙得詩五十六書序記誌祭文總二十與無擇昔藏增多詩一十二書序各一又從其舊友而求之往往知愛而不知傳故無獲焉姑類次是以爲三卷題曰河南穆公集云時慶曆三年春南康淸修閣中序卷一魯從事淸暉閣庾卽眞好事卽應作郎朱亥墓心事立徘徊立應作互登莒子臺遇風白日沈遇風應作遙峯樊博士化州監鹽歲還歲可期上歲字應作徵贈適公上人注同欲招師而偕往也同應作因秋浦會遇序人生所囗囗應作無闔戶日囗應作日因思非言無厥事應作以道二字又詩沙禽囗欲馴囗應作漸并說岐豳應作忘細草梁郊畛梁應作染㙳坷亦多遜繳已能傷雁遜應作迍繳應作徼仰聞蒼蒼理聞應作問躡囗三高士應作迹畚上封花上應作土鼓腹得還浮浮應作淳卷二答喬適書終始讀其書意甚高讀下有之字何足爲人盾其是非盾應作質如舊者不識其愚且戇如應作知識應作譏中名者無以兼乎道中應作守上監判郞中書所以未遑遑見於執事者下遑字應作進唐柳先生集後序韓則雖其全至所缺墜忘字失句雖下有目字忘應作亡久惟柳之道久應作而送李秀才歸泉南序而意能度十已亡其六七能應作態張當字叙當應作君送魯推官赴南海序苟上無必從之應作道魯囗以辭學中名應作君卷三亳州魏武帝帳廟記嘯吒馳騖乎其間吒應作咤乘光顯盛大之業乘應作垂容像再嚴再應作載今樞右丞相淸河公樞下有密字任氏家祠堂記今上囗元年應作之於是復是鄆而卽曹下是字應作自壽不爲少口囗府口應作官至兩三字敞三室而鬥五位鬬應作闢無復如言此者如應作知其門自唐後五代晉漢周後應作洎是以顯考主父神次主應作王蔡州開元寺佛塔記一旦從而和囗囗應作之靡然傾天下四人業人下有之字當必得親佛所遺爪髮齒骨一種得親作親得釋氏皆所會舍利者也會應作謂今塔塔之所以獲立下塔字衍養正堂記知乎此者進易之蒙進應作近故逸豪偉故應作雄亳州法相禪院鐘記能勤以寡衆寡應作募州人時士士應作氏疑嶷崇御名上凌煙空疑應作嶷東海徐君墓誌銘故事後親盡其力應作彌祭第二子文四歲而大大應作夭穆參軍遺事穆修字伯長伯長囗詩云應作有李之才字挺之倜儻不事事應作羣哀穆先生文與庸人小合小應作少蘇才翁子美悲二子聯句題下有旁注穆脩伯長凌孟陽伯華九字旣而裹飯交而應作无久僕勒龍鍾勒應作勤云矣不得别云應作去海内濟欲徹濟應作淸斯民乃貪下缺餮高亢世弗親子方嚴思所掣敢言才足珍寧􅊵否來美齧思潛淚輒抽才慘舊面成耋舉目此牢落側身今鄙媟箴言耳空虛子險論囗臲作討告石梁美聊以慰寒骨才六十九字穆參軍遺事穆脩字伯長汶陽人後居蔡州師事陳圖南而傳其學脩少豪放性𥚹少合多逰京洛間人嘗書其詩句于禁中壁間真廟見之深加歎賞問侍臣曰此為誰詩或以穆脩對上曰有文如是公卿何以不荐丁晋公在側曰此人行不逮文由是上不復問盖伯長與晋公有布衣舊晋公頃赴夔漕伯長猶未仕相遇漢上意欲伯長先致禮伯長竟不一揖而去晋公銜之由是短于上前後晋公貶朱崕徙道州伯長詩云却訝有虞刑政失四凶何事不量移可見其不相善也伯長祥符二年梁固榜登進士苐調海州理椽以忤通判遂為捃拾由是削籍隷池州其集中有秋浦㑹遇詩自叙甚詳後遇赦叙頴州文學参軍故當時呼之曰穆参軍老益家貧家有唐本韓栁集乃丐于親厚者得金募工􅍢板印𢾗百集携入京師相國寺設肆鬻之伯長坐其旁有儒生数軰至其肆輙取閲伯長奪取怒視謂曰先軰能讀一萹不失一句當以一部為贈自是經年不售時學者方從事聲律未知為古文伯長首為之倡其後尹源子漸洙師魯兄弟始從之學古文又傳其春秋學云辨惑陳搏好讀易以数學授穆脩伯長脩授學之才挺之之才授康莭先生邵雍尭夫同上李之才字挺之青州人倜傥不事師事伯長伯長性嚴急稍不如意或至呵叱挺之左右承順如事父兄畧無􅌒怠同上富韓公𥘉逰塲屋穆脩伯長謂之曰進士不足以盡子之才當以大科名也公果禮部試下継以賢良方正登第聞見録本朝古文桞開仲塗穆脩伯長首爲之倡尹洙師魯兄弟継其後歐陽文忠公早工偶儷之文故試于國學南省皆爲天下苐一既擢甲科官河南始得師魯乃出韓退之文學之公之自叙云爾同上祖無擇字择之蔡州人少從穆伯長爲古文後登甲科同上歐陽文忠公作蘇子美文集叙云天聖間予舉進士于有司見時學者務為言語聲偶摘裂號為時文以相誇尚而子美獨與其兄才翁及穆参軍伯長作為古謌詩雜文時人頗共非笑之而不頋也其後天子患時文之弊下詔書諷勉學者以近古由是其風漸息而學者稍趨于古焉漢上朱震子發言陳摶以太極圖傳种放放傳穆脩脩傳周茂叔朱晦菴記太極河南先生師魯古文學于穆伯長伯長有文十餘篇行於世韓栁之文因伯長而後行國𥘉知者有桞開言行録尹師魯傳文章自唐末厯五代氣格卑弱至本朝栁開始為古學天聖𥘉洙與穆脩大振起之文章自唐衰厯五代日淪淺俗䆮以大敝本朝栁公仲塗始以古道發明之後卒不能振天聖𥘉公獨與穆参軍伯長矯時所尚力以古文為主次得歐陽永叔以雄詞鼓動之於是後學大悟文風一變使我宋之文章踰漢唐而躡三代云唐至元元和間韓退之主盟于文而風雅最盛䆮及五代其體薄弱皇朝桞仲塗起而麾之髦俊率從焉仲塗門人能師經探道有文於天下者矣洎楊大年以應用之才獨歩當世學者刻詞􅍢意以希髣髴未暇及古也其甚者􅌹事藻餙破大雅反謂古道不適於用廢而弗學者乆之洛陽尹師魯少有髙識不逐時軰與穆伯長逰力爲古文士林始聳慕焉復淂歐陽永叔從而振之由是天下之文一變而古是大有功于道也范仲淹撰尹師魯文集序予識浮圗秘演二十年𥘉見時多與穆伯長逰伯長剛峻人罕能與之合獨喜演演善詩復辨博好論天下事自謂浮圖其學而儒其心若當世有勢者冠衣而振起之必犖犖取竒莭今老且窮其為佛縛詎得已耶伯長小州參軍已死演老浮圖固其分也師魯文歐陽文忠公論尹師魯墓誌云若作古文自師魯始則前有穆脩鄭條軰有大宋先逹甚多不敢断自師魯始也明道先生作邵康節墓誌云昔七十子學於仲尼其傳可見惟曽子所以告子思子思所以授孟子者其餘門人各以已之所宜為學雖同尊聖人所因而入者門户則衆矣况後此千有餘歲師道不立學者莫知所從来獨先生之學為有傳也先生淂之于李挺之挺之淂之於穆伯長推其源流逺有端緒今穆李之言及其行事概可見矣吕氏家塾邵尭夫先生受學于李挺之之才李之才受學于穆脩伯長穆伯長受學于陳搏希夷其所傳先天之學具見于易圗皇極經世書故程伯淳作尭夫墓誌云推其源流逺有端緒哀穆先生文嗚呼穆伯長以明道元年夏客死于淮西道中友人蘇叔才子美作詩悼之遣人馳弔之痛夫道不光余又次其一二行以鑑于世為文哀之先生字伯長名修㓜嗜書不事章句必求道之本原皆記生徒無意處熟習評論之性剛介喜于背俗不肯下與庸人小合願交者多固拒之議事堅明上下合古皆可録然好詆卿弼斥言時病謹細後生畏聞之又獨為古文其語深峭宏大羞為禮部格詩賦咸平中舉進士得出身調㤗州司法参軍牧守稱其才貳郡者悪之又嘗以言忤貳郡㑹守病皆貳者私點吏使誣告先生賂具獄聚左證後召先生使衆参考之由是貶池州中詣闕下叩登聞鼓稱冤㑹貳郡者死復受譴于朝后累恩得為蔡州参軍先生自廢來讀書益勤為文章益根柢于道然恥以文于有位以故困甚張文莭守亳亳之士豪者作佛庙文莭使以騎召先生作記記成竟不竄士名士以白金五斤遺之曰枉先生之文願以此為夀又使周旋者曰士所以遺者乞載名于石圖不朽耳既而亟召士譲之投金庭下遂促装去郡士謝之終不受嘗語人曰寕區區餬口為旅人終不為匪人辱吾文也天聖末丞相有欲置為學官者恥詣謁之遂不得嘗客京師南河邸中徃徃醉暮歸過之如不省持者夜半邸人猶聞其吟誦喟嘆聲因隙窺之則張燈危坐苦矉執卷亦出曙用是貸其資母䘮徒跣自負櫬成葬日誦孝經䘮記未嘗觀佛書飯浮屠氏也識者哀憐之或厚遺則必為盗取去不然且病或妻子卒后得桞子厚文刻貨之售者甚少踰年積得百緡一子輒死将還淮西道遇病氣結塞胸中不下遂卒吁噫天之厭文乆矣先生竟以黜廢窮苦終其身顧其道冝不容于今世然由賦数踦隻甞罹兵賊悪少軰所辱困其莭行至死不變有孤懦且㓜遺文散墜不收伯長之道竟已矣乎𥘉先生死梁堅自觧以書走上黨遺予欲訪其文俾予集序之去年赴舉京師歴問人終不復得一萹惟有任中正尚書家廟碑静勝亭記徐生墓誌蔡州塔記皆平昔所爲又不足成卷今舅氏守蔡近以書使徃其家且求其所著文字未至間作文哀之道不勝于命命不㑹于時吁嗟先生竟胡爲右蘇子美文蘇才翁子美悲二子聨句有客自逺方來以二子說穆子疾病𥘉家事鉅細缺鄰人苦其求才翁醫師乆巳决案杯大小空布被旁午裂餘喘尚能鼓子美老憤知已結目凄望羊泓髭断反蝟茁憂酸繫餘生才翁噑嘑留永訣語妻后日計書䇿未可徹教子立世資子美圎曲勿自悦吾属何流離衆人方草窃凌子乆道路才翁十口着覊絏恰旅重江間正值大飢莭既而裹飯交子美疾走継粗糲又無執漿人及時沃枯渇惜哉損天命才翁痛焉在親絰帝胡生爾身世復稱爾傑胸伏氣萬文子美腸貯怨百折艱難泊風波憔悴堕霜雪乆僕勒龍鍾才翁弱女癡䠥􅍷文随寒餓空道與烟焰滅魂兮竟何歸子美去矣不得别長府豈無財莫濟醫藥切太倉豈無粟才翁莫觧腹腸熱天子聖在上海内濟欲徹伊人胡不官子美既死安得活朝青與暮紫神喜天不軋高車與怒馬才翁門滿道不絶之子茍間厠斯民乃貪缺錢遵王家蔵照宋抄本世不知古文已獨爲之是儒之特立者也吾見三人矣董生當秦滅學之後明孔氏之術道曽子之言其文甚近古也雖同時若嚴助枚臯謂應義理子長相如博辨無極亦自爲其文而已未始識董生之用心由東京以後厯魏晋五代而文益衰至唐昌黎公始知尊孔氏貴王賤霸大變而古李翺皇甫湜從而和之然其後亦無傳焉唐衰更五季其弊又甚至我朝乃或推孫丁楊劉爲文詞之雄是時穆参軍伯長獨不以爲然實始爲古文在尹師魯蘇子美歐陽之先自爾以來學者益以光大非止求夫文之近於古而已盖異端既闢則必以聖人為師不􅌹注疏則必以經㫖為歸學均為已一變至道􅘦其承傳爰有端緒云銀關闢書售與有力焉愚嘗評穆參軍之復古以為不在董生昌黎公之下永州州學教授宜春歐陽椿得參軍之文于其從孫化州使君淮俾零陵鄉貢進士張淡吳倫校之不鄙謂愚可紀歲月深惟㑹友輔仁之義有不得而辭者輙書其後大不自量淳熈丁未孟秋既望衡陽假守臨江劉清之謹題
