body:
  text: 穆修伯長記亳州魏武帝帳廟記譙東有祠巋然宅于衍之上者粵魏武帝之祠歟嗚呼帝實此土人始以諸生去仕為吏則圖大略雄偉不世之量屬炎運衰息皇網紊紀海內震優群雄並爭帝于時得乘機奮䇿嘨吒馳騖乎其間用能建休工定中土乘光顯盛大之業于來世焉當帝之經營征伐也袁紹父子據兵河朔吳權蜀偹內窺中夏帝挾持漢室抗力三方慷慨興言則失彼匕箸從容計事則走人頭顱卒滅袁而沮權偹之强者惟帝之雄使天濟其勇尚延數年之位得徐圖成敗其伐謀制勝料敵應變之下豈江吳庸蜀而足平哉至今千年下有觀其書猶震惕耳目聳動毛髮使人凛其餘風遺烈矧譙之舊邦祠堂在目像貌如生里人事之敢弗祗畏前代帝王莫不皆有祠廟秦漢以還首事之主得廟祀鄉里事著于時者惟高祖之于豐沛光武之于南陽廟貌咸存威德勿泯其次則譙廟也赫然有豐沛南陽之迹焉此三君者皆由微時仁恩長者為鄉里人所愛后思懷其德共自尊祀之遂傳于今不息也真宗皇帝車駕有事于亳宫之歲䛇增帝故廟而新之容像再嚴有焯有耀以帝之明靈加吾宋振顯其迹德用益興矣乎乾興元年春今樞右丞相清河公來撫于亳至之三日謁于祠下既退命左右使謂邦人曰武帝廟享于此土久矣庇于爾民厚矣水旱灾害爾民請焉疾病疫癘爾民禱焉亳之土徼帝之福不既多乎今其廟與像則䛇修之顧惟殿內廊廡帷帳之蔽使埃壒及座延于冠冕為闕孰甚吾將自出私俸盡為具武帝洎文明三殿之帳誠無為艱如彰爾民慢帝之咎以吾臨此州不能導爾民心知所奉是亦吾過故遂使告于爾民衆聞公言慚且喜曰亳民暗鄙蔑有所知䝉帝之休罔識攸報為罪大矣今我公有言始克知過俾獲逃罪于帝之靈繄我公之恩是賜是賴敢不聞命即衆人請曰幸公皆許民營之願不煩公也公曰我本率將自具既思同爾民于欲不可盡􅌹吾當與爾民共其事即以俸緡合民之用命工偕作未歲而三帳成即置其殿內有帳之號非繒帛是製而成以木者圗其久也其年十一月公承䛇歸機密之地公在亳不滿歲而去既去之日猶始至之辰是歲亳人飢公至闕即上言得徙淮南數州廪米來貽一本作給亳人噫公之愛人甚矣使循常有位者得聞入為天子近密委其民而去之雖草莾之不若又暇顧其飢哉公前居一州猶且勤勤為州人求福于前代帝王不懈今君為朝廷一本作朝廷為親近大臣其贊帝王治以福于天下之人肯又懈乎天聖元年二月日記任氏家祠堂記今上元年尚書康懿公由參知政事出領太平郡居一年以齊國太夫人春秋益髙至陳懇言求為本州以便其飬䛇尋從之于是復是鄆而即曺既至未期歲屬齊國艱憂公遂去位而以私館居則盡斥絶粱肉弗視惟菜茹食以終日公魁碩人也至是頓𬒳瘠毁體軀不支家人憂其􅉵甚爭諌止之乞稍進葷茹以自持助公曰吾頃服從王事有家靡居左右承顔情至闕違今日得紀紀敢尚不率盡子道耶皆不聼越三月竟以毁瘠而不起嗚呼公其可謂孝德有聞也矣將終顧謂其子都官員外郎中師曰吾年踰六十壽不為少府位不為輕今得收其躬以獲歿于先人幸矣然獨所恨者不克及吾之存畢先塋事耳吾俸賜之餘力足以舉爾其勉之惟速無緩都官念康懿戒付刻切時雖齊國在殯求欲苫廬守禮斯亦不得即以縗服晝而從事于外始卜其阡于曺之南近郭未及葬也日往自視樹墓柏或數千疲心瘁躬事以遽立既而治其苐之側隅起作新堂者敞三室而鬪五位前後左右皆有宇以引掖之華以丹刻之飾六年春某東行見同年都官兄于曺一日目是宇而言顧我無以致孝愛于先親先兄將以是升畫像而荐歲時焉茍無述也其何以貽厥聞請以事屬諸子某辱兄之命不敢讓乃言曰兹宇之設其近于家廟者耶惟家廟事自唐人修尚舊禮粗復其製時衣冠室襲行之始著唐德而既往旋又廢于五代之兵興自是以來將相文武之家無復如言此者增築苐産之盛則知患其不崇且廣終莫患其先廟之闕而不立古君子不敢以私褻交于神明故制器服立宗廟以祠其先示誠潔也今人既用常所器服而又祭之于寢蓋亦不知事神之道使士君子之祭疑于匹庶人之祭久矣倘非世蹈名矩率禮敦教一作孝之族其孰克思之其族維何其在康懿公之門乎康懿公姓任氏其門自唐後五代晋漢周傳官不息以入國朝是興贈開府儀同三司太師尚書令兼中書令諱載儀同高才偉識籍問鏗世德豐以約委羡厥後實有賢子五人皆齊國太夫人白氏之出兵部尚書贈左僕射諡康懿諱中正其長子次中孚西頭供奉官閣門祗候次中行尚書兵部員外郎次今都官郎中也最季中立左侍禁閣門祗候供奉逮兵部皆先康懿並終今從享于儀同齊國左右儀同特立于中室以東室為齊國之坐康懿位西室而清河郡夫人張氏陪焉兵部供奉各處二側位其嚴慈之尊長幼之序煌煌遺像堂堂如生宗屬以之視瞻精爽以之馮附蒸祠有所不潰其䖍斯肅其神斯饗孝之至也禮稱有其財有其禮無其時君子不為也廟祀之事不作已久求矯行之必取世議時所牽制禮不獨伸則家廟之名既罔得而有其昭穆之位固無因而立是以顯考主父神次不敢盡陟而時享合叙抑有常焉矧按前代私廟並置京師今本不從廟稱而復設于居里敢請號曰家祠堂者信適事中而允時義矣噫家廟者豈可不復矣乎茍復之則已如未之復則斯堂也於奉先之道得一時之禮矣蔡州開元寺佛塔記西佛氏法唱中夏為寺宇于中夏先王之遺民樂聞其法尊雄一旦從而和棄世守常義弗顧而為其徒者靡然傾天下四人業胡其如是之盛耶豈佛氏之法為能本生民甚惡欲之情而導之耶不然何以能鼓動群俗之心如趨號令之齊一也夫生民之情大矣聖人知其不可充也為之著禮明義以莭飬之使不流不窘安其分盡其常以生死焉而不及他道者三代之民也今佛氏之法後三代而作極其說于聖人之外因斯民所惡欲而諭以死生禍福之事謂人享有于其身者皆由死生往復而取之方于植物者根夫善善以之而生于今種夫惡惡以之而出于后其貴為冨為夀為康寧皆根夫善者也而統謂之福為賤為貧為疾為夭皆種夫惡者也而統謂之禍福禍之報不移也世聞其說甚懼謂死且復生則孰不欲其貴冨康夀而惡其賤貧疾夭雖君子小人一其情也然何如即可以違所惡而獲所欲曰非去而為佛之徒讀佛之書則不可人所以悅其法而歸其門者為能得己欲惡之心乎佛亦安能強使人附之哉如死生禍福之說使禹湯文武周公孔子亦嘗言之則人亦必從此六聖人而求之如其聖人所不及惟佛氏明言之則人焉得不從佛氏而求之也豫謂世有佛氏以來人不待禮義而然後入于善者亦多矣佛氏其亦善導于人者矣嗚呼禮義則不競宜吾民之皆奉于佛也宜其佛之獨盛于時也佛日益盛徒日益繁則當有異行之士奮臂而出力樹塔廟以廣弼其法之興就其實而言之則隆塔廟誠佛事之末茍以時觀之能恢赫顯灼使人見之一作目之起恭生信則無如塔廟助佛之大故雖窮逺僻阻川塗所出必有佛之塔廟以瞻向于俗也矧中州近壤之衝㑹乎然而佛塔與廟抑有其說中藏像事而旁棲徒衆者實為廟惟佛塔之設當必得親佛所遺爪髮齒骨一種或積精力所成如珠璣類者釋氏皆所㑹舍利者也然后函以金石竁地而藏焉因起浮屠于上以表識之是曰佛塔耳諸所立者靡不然而蔡州開元佛寺其踊甓成七級浮屠者是謂葬佛項骨舍利焉其始自雍熙四年故相太子大師吕公為郡日其佛骨自京師降吕公尋之去郡以屬僧志者俾后興塔于寺以葬奉之后志方肇心㑹卒曰僧榮者復上承之自是迄大中祥符𥘉榮始再議所舉得喬張二豪吏歸入資用僅獲就事于時浮屠才基一級而已榮終度力難以竟即又罷去于是州耆釋叟惜其跡已植而止相與謀其可以終事于塔者復得寺僧海微而請之微一本無而請之微四字起應請實堪其任今塔塔之所以獲立自海微力塔既立未致偹飾而微歿時天禧二年也付其事于門人永昌纂之永昌紹成師志罔有暫懈悉心募力未幾而闕飾云具其範鐵塗銀頴然而擢立其端者是曰相輪其棟石甍瓦翼然而周蔽其趾者是曰散水計二事役費于浮屠亦三之一焉皆永之為也永其可謂善繼師之勤矣較三四釋之功是則肇于志而基于榮克成于微而大偹于永雖經始營為殊先後巨細其因作之跡則皆有力于塔者其所謂異行之士歟塔始于大中祥符𥘉訖于天聖之六年出入二十年之際厥有成績其糜用財力積劇亦至矣永師列其本末來請得以著成于記飬正堂記韓君堯言登進士苐九年始再任為泗州録事參軍到官之五月以𪠘舍蹙狹由視事廳一本有則字逹乎寢他無宴休之地俯廳西北隅先有屋𢾗楹已故敗就摧因令堂而新之以偹其所為宴休者于時河南穆修訪君淮上目其始立君曰為我命以名而記之即從而言曰堯言少年以文辭上第其視冨貴為朝夕事今十年間乃猶盤回效州縣職屑屑以斗石祿為急著公衫把手板旅進退郡庭下瞻望上官顔色非為計之得矣不獨如是復為讒狡小輩走謗議其間喧譊不已所以古人憤悒脫冠委印綬不顧而去蓋此也堯言曽不以是動其心汨汩隨波上下無所可否獨何歟將有其說人抱畜才識凡得以施用者不有高位當遇知已去是則才之與識或不可使以外發發輒受攻于物知乎此者進易之䝉蒙以飬正之謂焉非變通之才孰取之今堯言居是職其有以幾乎豫與堯言交舊而復同年登科不謂不知其平昔故逸豪偉真無顧避座有論說不輕以氣語低人至是乃能刓鋒稜藏戢崕岸約束若纎謹男子為者終日挈挈守其曹事不少為俯眉動容起􅌒怠意真可尚也堯言既為斯堂將施名而屬豫豫悅堯言所守從而得堂之名即命其堂曰飬正既命之㳂其名以為記亳州法相禪院鐘記古之為鐘其用大矣樂記稱黃鐘大吕又春秋傳稱有鐘鼓曰伐則是鐘為禮樂之偹又為征伐之具其用之大樂可以調隂陽感人神導天地之和用之軍旅可以讋不軌懼不庭振邦國之和考是二者則鐘為禮樂征伐之器久矣三代之際以及秦漢皆不變其用今是鐘也專為釋氏之器亦從可知也東漢之運將季西域之法聿來流晋宋而益崇涉齊梁而太盛率天下而從其教擬王者而闢其居無公王無士民無高卑貴賤豈不從而信奉之不從而依皈之以求其福報乎如是則盛矣大矣佛之為法也既與中國聖人之道並行于時則所謂禮樂征伐之器者安得不入于佛之宫哉佛之宫其徒群棲而旅集多者𢾗百人而居之其朋既繁不常厥處將齊彼衆非言得通則必聲物以齊之求物聲宏逹而及逺者莫踰于鐘是知鐘為佛宫之用其在兹乎亳州法相禪院有主院僧海宣者謹行之僧能勤以寡衆崇揭土木門堂殿廡總百餘間多宣師所及也聚徒侁侁資膳悉偹警旦暮者其闕惟鐘州人時士豐財好佛之士也一日詣宣而謀曰一鐘之費其用幾何願輸其資獨營斯善師即計其用度告之遂以銅若干斤師復謂曰鐘之成也匪高弗居則并請為居鐘之樓以此土不産美材因命僧海真南抵于舒鞭其材木匠為成器而離之自舒及譙使以舟力雖皆出時氏然能减費便事者蓋二師心計運度之謀也天聖元年春始召鐘人興其鼓鑄液彼金錫一冶而成鐘事既立樓材亦至建于殿南東偏居鐘于上層甍翬飛雙鑾鯨震疑嶷崇御名上凌烟空琅琅洪音逺落霄外于以壯觀精宇于以號令群緇且叩焉使思其所以息晦明風雨不迷厥時據釋氏言鐘之聲扣之可以上極天界下洞幽泉導死者冥昧之魂出地獄沉淪之苦故死者之家嘗賂金帛衣服求擊其響若如其說則非獨用之莭昏曉戒食寢而已又復能售極苦之資助釋氏之費焉鐘不可闕于佛宫一本有亦字明矣靜勝亭記州郡有兵馬監押職設今代專督州中姦爭火盜洎軍籍庫兵啇征酒榷之事則皆與守同管署自政賦財幣刑罰獄訟之煩則一不一本有關事及其職位優其務守簡蓋士之階武而升者非歷勞久十餘年不𬒳兹命凡尸之者能持謹常不失局事巨細筆不闕可否歸之州足為稱任雖材且無所施顧或每每好用自優以招權樹威而病其職者多矣頴川陳君永錫始以公侯裔縻跡落武一再遷為右侍禁蓋漢之郎將類也來監蔡之郡戎為人力文服古而雅任濶逹樂所守無事惟比旦一過廳還則擁書自娛常言吾職甚逸吾性加踈思得灑然空曠一宇為寄適之地盡糞除耳目俗譁而休吾心焉𪠘中舊有亭其制卑而久為之易去故材俾豐宏之前𢾗十步間夾樹畹𬞞蹊果果外先峙射堋堋豈清趣中冝有哉然于亭逺甚不大與亭害故亦不廢姑存之亭成陳君謀豫以名豫請以靜勝名亭陳君之飾是亭豈志于靜者耶夫靜之閫仁人之所以居心焉在心而靜則可以勝視聽思慮之邪邪斯勝心乃誠心誠性明而君子之道畢矣惟陳君能有是道故名是亭人茍不果其道名無益也是無實而守空器也不與夫盜名而居者比歟後之縻斯職據斯亭者亦復能悅靜而思勝乎茍能善矣無為自優而病其職以守亭之名為亭之愧也明因院羅漢像新殿記距常熟縣治之東南越三十里有浮屠居曰明因本淳化中之錫名也浮屠師業者始居之能勤飭其軀靡懈以裒力于民之里召塑工為五百像釋謂之羅漢者加新其殿御名而納之辛亥歲夏五月告畢工師求記之以文豫儒者稱浮屠之法懼非所能請以目所常覩浮屠者並緣土木佛事終依之為姦以幸其身而敗汚其類者言之亦足以昭師之善矣豫行天下往見山墟林野間有級磚以為佛塔者其趾之豐若將為百尋之高或不𢾗尋而罷有植木以為佛廟者其基之博若將為百楹之廣或不𢾗楹而止其委甓餘材猶棄積于下訪之其側則曰始佛之徒也將欲有為于是張其勢甚盛苦其行甚篤至能黜衣退食盡用于佛𥘉人大為傾信而悅助之貨斯萃欲斯至自是每十其獲不一入于佛常私其九以自取人復覺之信遂以哀以故卒無以立而亡去之豫謂此無他也由始信而終欺也冝其無成效焉凡倡事之道已必先信猶懼人之莫應矧已為不信而欲人之應世未之聞又獨釋氏哉今師營是像作是殿必有淂于信之術矣不然何能遽有就之如是也嘗聞東南人尤嗜于佛至有傾資舉産以為奉而無愛者師而後能益謹其術而待之庸知里人之有力焉不盡為師之奉也墓志東海徐君墓志銘進士徐孝山喪其父執喪之三日得友張生道卿所録父事拜且泣復授之張生并繼以語俾來請曰孝山未即殞生尚惟喪事不可緩將卜葬以某日期日且迫敢迹其日託銘于先生用刻而納之以光永幽穸豫既受而閲其始卒乃謂曰是葬也蓋得其禮矣比今貴家冨族將葬其先必惑葬師說拘以歲月畏忌大至違禮過時久而不克葬者多矣生能葬以其道至合士禮逾月之制此獨可尚又安得拒請而勿銘也按君諱文質字處中其先祖父嘗寓籍并土之文水逮君之考猶為晋人考生未齔而孤見教育于季父氏既而復為朝廷以兵取太原既平大徙并民入處之京輔考于時與其族來京師遂家焉自是得逰太學為生徒治春秋經傳前後四舉有司竟不及祿而終考始娶頴川陳氏女亡再娶清河張氏生男子二人女子二人次子曰文蔚少卒獨君為前室陳氏所生二女子今皆適京師良族由君而下始為京師里人凡并人其俗剛厚而勤嗇能自莭損以立衣食諸來徙之户𥘉雖貧劇者居久而皆為冨屋矧其宿有齎者蓋可知故考亦用是而植其家考之殁貽其規法于君君于此益為之善守者也君常念陳氏早世又傷父之不逮故事後親盡其力無何𢾗年張氏又終𥘉君亦嘗受經于儒官馬龜符有慕仕進心至悼親之繼喪顧門中時無强子弟可任懼覆先人遺業則為不肖子因刻力事生于家非時莭慶弔大事不出門如此蓋有年天聖八年適五十忽得病醫纍月弗愈以是年七月十七日卒于居君凡四娶室輒先喪有四男五女𥘉室李氏無子長子孝山出次室李氏景山德山皆未及娶五女子亦幼在室孝山有諸弟妹合族謀葬得其年八月之二十一日藏君于東京之祥符縣開封鄉西韓村先墓之次以次室李氏為合𥘉李氏次苗氏李氏三室皆同穴而異棺斯實禮也銘曰惟古之葬等殺異冝日月有𢾗無越厥期末代不然惑于葬師隂陽拘忌率常過時其孰警此伊徐氏子以時而葬順禮之軓既合既祔有銘有紀如君之藏民亦鮮矣祭文祭第二子文月日阿爹以果子飲食弄具祭于第二男道子之靈嗚呼汝生而慧嶷體質粹竒舉家愛憐保飬甚厚始三歲則微有知見見詩書能舉能視吾與汝母其喜可勝謂汝他日必大吾門如何不永四歲而夭嗚呼哀哉汝沒之辰我客京師家避吾驚不以時告我之既還聞于中途延道哀號知無及矣但與家僕相持殞絶嗚呼生人之理有幸不幸惟彼頑塞輒踐遐年念汝豐完反成殤子嗟乎天道既使之育育而不長孰如勿生免此大痛嗚呼汝舍我去無期復還我思汝悲何時而已汝王父王妣旅櫬未葬俟畢先壠以歸汝骨草瘞郊次祖母俯近此魂有依無至驚怖父臨祭汝汝其享之號訣終天相期泉壤尚饗河南穆公集卷第三
